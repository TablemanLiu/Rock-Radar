<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Radar - 战力雷达图</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap");
        /* 引入鸿蒙字体 (使用更稳定的全局地址) */
        @import url("https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/harmonyos-sans/1.1.0/style.css");

        :root {
            --theme-color: #00ffff;
            --bg-color-1: #0f1015;
            --bg-color-2: #1a1a2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: "HarmonyOS Sans SC", "PingFang SC", "Lantinghei SC", "Microsoft YaHei", "HanHei SC", "Helvetica Neue", "Open Sans", Arial, sans-serif; 
            overflow: hidden; 
            background-color: #000;
            background-image: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2), #050508, #111);
            background-size: 400% 400%;
            animation: gradientBG 30s ease infinite; 
            color: #fff; 
            transition: all 2s ease; 
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: -1;
        }

        body.particles-disabled {
            background-image: none !important;
            animation: none !important;
        }

        #particles-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1005; /* 初始置顶以显示粒子 */
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            position: relative; 
            z-index: 2; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            padding: 1vh 1vw; 
        }

        .main-layout {
            display: flex;
            width: 98%;
            max-width: 1700px;
            height: 94vh;
            position: relative;
        }

        .left-panel { 
            flex: 1.3; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
            overflow: visible; /* 允许雷达图辉光溢出 */
        }

        #radarCanvas { 
            width: 100%; 
            max-width: 900px;
            height: auto; 
            aspect-ratio: 1/1;
            /* 1.6 倍放大使得内部逻辑长宽增加 60% 后，能包容哪怕是 20 分这样的越界图像，且最终在屏幕上的视觉大小依然和原先严格一致 */
            transform: scale(1.6); 
        }

        .right-panel { 
            flex: 0.7; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 0 10px;
            margin-left: 5vw; /* 向右移动一点 */
        }

        .band-info-box {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .band-name { 
            font-family: "Orbitron", sans-serif;
            font-size: 3rem; 
            font-weight: 900; 
            color: var(--theme-color); 
            text-shadow: 0 0 15px var(--theme-color);
            transition: all 2s ease; /* 名字颜色和发光慢速切换 */
            animation: nameEntrance 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes nameEntrance {
            0% { opacity: 0; transform: scale(0.5) translateZ(-200px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateZ(0); filter: blur(0); }
        }

        .band-photo-container {
            width: 100%;
            height: 380px; 
            background: transparent;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            transition: all 2s ease;
            perspective: 1200px;
        }

        .band-photo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0;
            transform: scale(0.3) translateZ(-500px);
            transition: opacity 1.2s ease, transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .band-desc-container {
            align-self: flex-start;
            display: inline-block;
            padding: 25px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 12px;
            transition: all 2s ease; /* 边框色变色慢速切换 */
            max-width: 95%; 
            opacity: 0; /* 默认隐藏，由动画控制显示 */
            animation: descEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        @keyframes descEntrance {
            0% { opacity: 0; transform: scale(0.8) translateZ(-100px); }
            100% { opacity: 1; transform: scale(1) translateZ(0); }
        }

        .band-desc { 
            font-size: 1.8rem; 
            line-height: 1.3; 
            color: rgba(255, 255, 255, 0.9); 
            transition: all 2s ease;
        }

        .progress-bar-container {
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.05);
        }

        .progress-bar {
            height: 100%;
            background: var(--theme-color);
            box-shadow: 0 0 20px var(--theme-color);
            transition: background 2s ease, box-shadow 2s ease;
            width: 0%;
        }

        /* 底部全局进度条 */
        .global-timeline-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            z-index: 100;
            cursor: pointer;
        }

        .global-timeline-bar {
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--theme-color));
            width: 0%;
            transition: width 0.1s linear, background 2s ease;
            position: relative;
        }

        .global-timeline-bar::after {
            content: "";
            position: absolute;
            right: 0; top: 50%;
            transform: translateY(-50%);
            width: 4px; height: 100%;
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }

        .timeline-tooltip {
            position: absolute;
            bottom: 25px;
            color: #fff;
            padding: 5px 10px;
            font-family: "Orbitron", "HarmonyOS Sans SC", sans-serif;
            font-size: 0.9rem;
            pointer-events: none;
            display: none;
            z-index: 101;
            text-align: center;
            text-shadow: 0 0 10px var(--theme-color), 0 0 5px #000;
            white-space: pre; /* 支持换行显示显示乐队名 */
        }

        /* 准备页面 */
        #introOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 1002; /* 必须比粒子 canvas 还要高，才能挡住雷达 */
            transition: opacity 1s ease;
            pointer-events: none;
            opacity: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #introOverlay::after {
            content: "按空格开始";
            color: rgba(255, 255, 255, 0.4);
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 1.5rem;
            letter-spacing: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.2; }
            50% { opacity: 0.8; }
            100% { opacity: 0.2; }
        }

        #introOverlay.started::after {
            display: none;
        }

        .session-timer {
            position: fixed;
            bottom: 20px;
            right: 30px;
            font-family: "Orbitron", sans-serif;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            z-index: 10;
        }

        /* 全屏模式下的 UI 隐藏 */
        :fullscreen body { cursor: none; }
        :fullscreen .global-timeline-container,
        :fullscreen #globalTimeline,
        :fullscreen .progress-bar-container,
        :fullscreen .session-timer { 
            display: none !important; 
        }

        .fade-out { 
            opacity: 0; 
            transform: scale(0.8) translateZ(-100px); 
            transition: all 0.5s ease-in;
        }

        /* MVP 乐队底图容器 */
        .mvp-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; /* 在背景渐变之上，在容器 container 之下 */
            pointer-events: none;
            overflow: hidden;
        }

        .mvp-bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* 改为 contain，防止裁切 */
            object-position: left center; /* 靠左对齐 */
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to right, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0) 100%);
            transition: transform 2.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 2.5s ease;
            transform: translateX(-100%); /* 初始在左侧外部 */
            opacity: 0;
        }

        .mvp-bg-image.active {
            opacity: 1;
            transform: translateX(0); /* 滑动到原位即左侧对齐 */
        }

        .mvp-bg-image.exit {
            transform: translateX(0); /* 退出时不移动位置 */
            opacity: 0; /* 仅逐渐消失 */
        }
    </style>
</head>
<body>
    <audio id="bgMusic" src="music.mp3"></audio>
    <div id="introOverlay"></div>

    <div id="mvpBgContainer" class="mvp-bg-container"></div>

    <canvas id="particles-canvas"></canvas>
    <div class="session-timer" id="sessionTimer">00:00:00</div>

    <div class="container">
        <div class="main-layout">
            <div class="left-panel">
                <canvas id="radarCanvas" width="1600" height="1600"></canvas>
            </div>
            <div class="right-panel">
                <div class="band-info-box">
                    <div class="band-name" id="bandName"></div>
                    
                    <div class="band-photo-container" id="photoContainer">
                        <img id="bandPhoto" class="band-photo" src="" alt="">
                    </div>

                    <div class="band-desc-container">
                        <div class="band-desc" id="bandDesc"></div>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="global-timeline-container" id="globalTimeline">
        <div class="global-timeline-bar" id="globalBar"></div>
        <div class="timeline-tooltip" id="timelineTooltip">00:00</div>
    </div>

    <script>
        const COLOR_PRESETS = [
            { color: "#00ffff", bg1: "#001a1a", bg2: "#000d0d" }, // 青色系
            { color: "#ff00ff", bg1: "#1a001a", bg2: "#0d000d" }, // 洋红色系
            { color: "#ffff00", bg1: "#1a1a00", bg2: "#0d0d00" }, // 黄色系
            { color: "#00ff00", bg1: "#001a00", bg2: "#000d00" }, // 绿色系
            { color: "#ff4500", bg1: "#1a0700", bg2: "#0d0300" }, // 橙红色系
            { color: "#1e90ff", bg1: "#000f1a", bg2: "#00070d" }, // 道奇蓝
            { color: "#ff0040", bg1: "#1a0006", bg2: "#0d0003" }, // 玫红色系
            { color: "#7cfc00", bg1: "#0c1a00", bg2: "#060d00" }, // 草绿色系
            { color: "#ba55d3", bg1: "#13091a", bg2: "#09040d" }, // 中兰花紫
            { color: "#40e0d0", bg1: "#061a18", bg2: "#030d0c" }, // 绿松石系
            { color: "#f08080", bg1: "#1a0e0e", bg2: "#0d0707" }, // 浅珊瑚红
            { color: "#00fa9a", bg1: "#001a10", bg2: "#000d08" }, // 中春绿色
            { color: "#ff8c00", bg1: "#1a0e00", bg2: "#0d0700" }, // 深橙色系
            { color: "#9370db", bg1: "#0f0b1a", bg2: "#07050d" }, // 中紫色系
            { color: "#00ced1", bg1: "#00151a", bg2: "#000a0d" }, // 深青色系
            { color: "#ff1493", bg1: "#1a0210", bg2: "#0d0108" }, // 深粉色系
            { color: "#adff2f", bg1: "#111a03", bg2: "#080d01" }, // 黄绿色系
            { color: "#b0c4de", bg1: "#12141a", bg2: "#090a0d" }, // 亮钢兰
            { color: "#eea2ad", bg1: "#1a1112", bg2: "#0d0809" }, // 浅粉红
            { color: "#00bfff", bg1: "#00131a", bg2: "#00090d" }  // 深天空蓝
        ];

        let colorPool = [...COLOR_PRESETS].sort(() => Math.random() - 0.5);
        let colorIndex = 0;

        // 全局配置参数
        const CONFIG = {
            RADAR_SCALE: 1.0,            // 雷达图底图大小缩放比例 (默认1.0)
            RADAR_GRID_LEVELS: 5,        // 雷达图底图行数（圈数）
            RADAR_GRID_LINE_WIDTH: 3,    // 雷达图底图线条粗细
            RADAR_GRID_LINE_OPACITY: 0.2, // 雷达图底图线条透明度
            PARTICLE_OPACITY_MULT: 2.0,  // 背景粒子特效透明度倍率
            PARTICLE_SIZE_MULT: 2.0,     // 背景粒子特效大小倍率
            VERTEX_COUNT: 6,             // 雷达图顶点数（默认为6边形，可改为8边形等）,一定要把DIM_NAMES等数组内容也改成对应的个数!
            INTRO_WAIT_TIME: 1000, // 开头准备页等待时间 (ms)

            // 雷达图各个维度的名称
            DIM_NAMES: ["创新性", "旋律", "歌词", "影响力", "主唱", "乐器"],
            // 六个维度的满分基准线，每个维度可单独控制
            BASE_MAX_SCORES: [10, 10, 10, 10, 10, 10], 
            // 六个维度的允许最低分数，每个维度可单独控制
            MIN_SCORES: [0, 0, 0, 0, 0, 0], 

            ANIM_DURATION: 1500, // 雷达各项数值生长动画的过渡时间 (ms)

            // 是否启用特殊的数值格式化（如雷达图的实际值在 11-19 时显示为 "10+"）
            ENABLE_SPECIAL_FORMAT: true, 
            DEFAULT_DURATION: 5000, // 默认每页的的展示时长 (ms)
            SHOW_DESC: true, // 是否显示描述文字(乐评)
            IMAGE_SCALE: 1.0, // 图片默认缩放比例 (1.0 为原始大小)

            // 哪些维度显示为百分数（例如 0.7 变为 70%）。数组长度 6，true 表示显示为百分数，false 表示显示为普通数字
            USE_PERCENTAGE: [false, false, false, false, false, false],
            LABEL_MARGIN: 80, // 维度名称距离雷达图外圈的距离 (px)，默认 80
            USE_AUTO_PRECISION: true, // 是否根据 points 中定义的位数自动控制显示精度（例如写 8.5 就显示 8.5，写 8 就显示整数）
            SHOW_SCORE_UNDER_NAME: false, // 是否将评分数值显示在维度名称下方
            LABEL_FONT_SIZE: 28,          // 维度名称字体大小 (px)
            SCORE_FONT_SIZE: 24,          // 评分数值字体大小 (px)
        };

        function getNextColor() {
            const c = colorPool[colorIndex];
            colorIndex = (colorIndex + 1) % colorPool.length;
            if (colorIndex === 0) colorPool.sort(() => Math.random() - 0.5);
            return c;
        }

        const mvplist = ["The Beatles"];

        // ["创新性", "旋律", "歌词", "影响力", "主唱", "乐器"]
        // 可选属性: 
        // colorIndex: 对应 COLOR_PRESETS 索引 (0-19)
        // duration: 该条目持续显示时间 (ms)，默认由 CONFIG.DEFAULT_DURATION 决定
        const namelist = [

{ name: "The Beatles", points: [15, 15, 10, 20, 10, 10], desc: "无需多言", colorIndex: 12 ,duration: 6000 },
{ name: "Nirvana", points: [9, 8, 9, 12, 9, 7], desc: "xqcl" },
{ name: "Radiohead", points: [13, 8, 9, 10, 8, 12], desc: "rym亲爹。我一直是idm粉丝啊" },
{ name: "Bob Dylan", points: [14, 4, 15, 14, 1, 2], desc: "诺贝尔文学奖得主的含金量，要歌词有歌词，唱功有歌词" },
        ];

        const bands = namelist.map(b => {
            const preset = (b.colorIndex !== undefined) ? COLOR_PRESETS[b.colorIndex] : getNextColor();
            
            // 自动检测每个维度在 points 中定义的精度（小数位数）
            const precisions = b.points.map(val => {
                const s = val.toString();
                const dotIdx = s.indexOf('.');
                return dotIdx === -1 ? 0 : s.length - dotIdx - 1;
            });

            return {
                ...b, 
                precisions, 
                isGoat: mvplist.includes(b.name),
                duration: b.duration || CONFIG.DEFAULT_DURATION,
                ...preset
            };
        });

        // 时间轴计算
        let totalDuration = bands.reduce((acc, b) => acc + b.duration, 0);
        let timeSegments = [];
        let accumulatedTime = 0;
        bands.forEach((b, i) => {
            timeSegments.push({ start: accumulatedTime, end: accumulatedTime + b.duration, bandIndex: i });
            accumulatedTime += b.duration;
        });

        const ANIM_DURATION = CONFIG.ANIM_DURATION;

        /**
         * 格式化雷达图显示的数值标题
         * @param {number} value - 原始雷达数值
         * @param {number} index - 当前维度的索引（0-5）
         * @returns {string|number} - 将要在图表上显示的文字
         */
        /**
         * 格式化雷达图显示的数值标题
         * @param {number} value - 原始雷达数值
         * @param {number} index - 当前维度的索引（0-5）
         * @returns {string|number} - 将要在图表上显示的文字
         */
        function formatRadarValue(value, index) {
            // 获取当前乐队当前维度预期的精度
            let precision = 0;
            if (currentIndex !== -1 && bands[currentIndex]) {
                precision = bands[currentIndex].precisions[index];
            }

            // 如果该维度需要显示为百分比
            if (CONFIG.USE_PERCENTAGE && CONFIG.USE_PERCENTAGE[index]) {
                let pctValue = value * 100;
                return parseFloat(pctValue.toFixed(precision)).toString() + "%";
            }

            let displayValue = parseFloat(value.toFixed(precision)).toString();
            
            // 如果精度要求为0 (整数)，则显式进行四舍五入并支持 "10+" 特殊格式
            if (precision === 0) {
                let intVal = Math.round(value);
                if (CONFIG.ENABLE_SPECIAL_FORMAT && intVal >= 11 && intVal <= 19) return "10+";
                return intVal.toString();
            }

            return displayValue;
        }

        let currentIndex = -1;
        let isGlobalTimelineDragging = false;
        let globalCurrentTime = 0; // ms
        let isParticlesEnabled = true;
        let particleFadeLevel = 1; // 1 为完全显示，0 为完全消失
        let isPaused = true; 
        let isStarted = false; // 是否已经按过空格开始
        let lastTimestamp = 0;

        let currentThemeColor = "#00ffff";
        let targetThemeColor = "#00ffff"; 
        let currentScores = [...CONFIG.MIN_SCORES];
        let startScores = [...CONFIG.MIN_SCORES];
        let targetScores = [...CONFIG.MIN_SCORES];
        let animProgress = 1;
        let animStartTime = 0;
        let startTime = Date.now();

        let activeHighlightDim = -1;
        let dimHighlightLevels = new Array(CONFIG.VERTEX_COUNT).fill(0);

        const radarCanvas = document.getElementById("radarCanvas");
        const ctx = radarCanvas.getContext("2d");
        const pCanvas = document.getElementById("particles-canvas");
        const pCtx = pCanvas.getContext("2d");
        const globalBar = document.getElementById("globalBar");
        const globalTimeline = document.getElementById("globalTimeline");
        const timelineTooltip = document.getElementById("timelineTooltip");
        let particles = [];
        
        function resizeCanvas() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(type = "normal") { 
                this.type = type; 
                this.reset(true); 
            }
            reset(init = false) {
                this.x = Math.random() * pCanvas.width;
                this.isTop = Math.random() > 0.5;
                this.y = this.isTop ? -100 : pCanvas.height + 100;
                if (init) this.y = Math.random() * pCanvas.height;
                
                if (this.type === "normal") {
                    this.vy = (this.isTop ? 1 : -1) * (Math.random() * 1.5 + 0.5);
                    this.vx = (Math.random() - 0.5) * 1;
                    this.size = Math.random() * 2 + 1;
                    this.bloomMult = 10 * CONFIG.PARTICLE_SIZE_MULT; 
                    this.alphaMult = 0.9 * CONFIG.PARTICLE_OPACITY_MULT;
                } else {
                    this.vy = (this.isTop ? 1 : -1) * (Math.random() * 0.4 + 0.2); 
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.size = Math.random() * 5 + 5; 
                    this.bloomMult = 15 * CONFIG.PARTICLE_SIZE_MULT; 
                    this.alphaMult = 0.25 * CONFIG.PARTICLE_OPACITY_MULT; 
                }
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                let dist = Math.abs(this.y - pCanvas.height/2) / (pCanvas.height/2);
                this.life = dist;
                if (this.life <= 0.05 || this.y < -150 || this.y > pCanvas.height + 150) this.reset();
            }
            draw() {
                pCtx.save();
                pCtx.globalAlpha = Math.max(0, this.life * this.alphaMult * particleFadeLevel);
                let gradSize = this.size * this.bloomMult;
                let gradient = pCtx.createRadialGradient(this.x, this.y, 0, this.x, this.y, gradSize);
                gradient.addColorStop(0, hexToRgbA(currentThemeColor, 0.7));
                gradient.addColorStop(0.3, hexToRgbA(currentThemeColor, 0.2));
                gradient.addColorStop(1, "transparent");
                pCtx.fillStyle = gradient;
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, gradSize, 0, Math.PI * 2);
                pCtx.fill();
                if (this.type === "normal") {
                    pCtx.fillStyle = "#fff";
                    pCtx.beginPath();
                    pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    pCtx.fill();
                }
                pCtx.restore();
            }
        }
        for(let i = 0; i < 50; i++) particles.push(new Particle("normal"));
        for(let i = 0; i < 25; i++) particles.push(new Particle("nebula"));

        function hexToRgbA(hex, alpha) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `rgba(${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}, ${alpha})` : `rgba(255,255,255,${alpha})`;
        }

        function lerpColor(c1, c2, t) {
            const r1 = parseInt(c1.substring(1, 3), 16);
            const g1 = parseInt(c1.substring(3, 5), 16);
            const b1 = parseInt(c1.substring(5, 7), 16);
            const r2 = parseInt(c2.substring(1, 3), 16);
            const g2 = parseInt(c2.substring(3, 5), 16);
            const b2 = parseInt(c2.substring(5, 7), 16);
            const r = Math.round(r1 + (r2 - r1) * t);
            const g = Math.round(g1 + (g2 - g1) * t);
            const b = Math.round(b1 + (b2 - b1) * t);
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        function updateTimer() {
            let diff = Math.floor(globalCurrentTime / 1000);
            let h = Math.floor(diff / 3600).toString().padStart(2, '0');
            let m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
            let s = (diff % 60).toString().padStart(2, '0');
            document.getElementById("sessionTimer").textContent = `${h}:${m}:${s}`;
        }

        function setProgressBar(duration) {
            const bar = document.getElementById("progressBar");
            bar.style.transition = 'none';
            bar.style.width = '0%';
            void bar.offsetWidth;
            bar.style.transition = `width ${duration}ms linear, background 2s ease, box-shadow 2s ease`;
            bar.style.width = '100%';
        }

        /**
         * 调度并执行UI的淡出过渡，然后调用核心切换逻辑
         * @param {Object} band - 即将展示的乐队数据对象
         * @param {boolean} isFirst - 是否是初始首次加载
         */
        function updateUI(band, isFirst = false) {
            const nameEl = document.getElementById("bandName");
            const depsEl = document.getElementById("bandDesc");
            const containerEl = depsEl.parentElement;
            const photoEl = document.getElementById("bandPhoto");

            if (!isFirst) {
                nameEl.style.animation = 'none';
                containerEl.style.animation = 'none';
                nameEl.classList.add("fade-out");
                containerEl.classList.add("fade-out");
                photoEl.style.transform = "scale(0.3) translateZ(-500px)";
                photoEl.style.opacity = "0";

                setTimeout(() => {
                    performTransition(band, isFirst);
                }, 500);
            } else {
                performTransition(band, isFirst);
            }
        }

        /**
         * 核心的视图与数据切换：更换文字、图片加载、应用主题色及计算雷达图目标分数
         * @param {Object} band - 即将展示的乐队数据对象
         * @param {boolean} isFirst - 是否是初始首次加载
         */
        function performTransition(band, isFirst) {
            const nameEl = document.getElementById("bandName");
            const depsEl = document.getElementById("bandDesc");
            const containerEl = depsEl.parentElement;
            const photoContainer = document.querySelector(".band-photo-container");
            const photoEl = document.getElementById("bandPhoto");
            const mvpContainer = document.getElementById("mvpBgContainer");

            targetThemeColor = band.color;
            document.documentElement.style.setProperty('--theme-color', band.color);
            document.documentElement.style.setProperty('--bg-color-1', band.bg1);
            document.documentElement.style.setProperty('--bg-color-2', band.bg2);

            nameEl.classList.remove("fade-out");
            containerEl.classList.remove("fade-out");

            // 根据配置调整图片容器高度以改变“外界大小”
            // 默认 380px 为 1.0 比例的基准高度
            photoContainer.style.height = `${380 * CONFIG.IMAGE_SCALE}px`;

            // MVP 底图逻辑
            const isMvp = mvplist.includes(band.name);
            const oldMvpImg = mvpContainer.querySelector(".mvp-bg-image.active");
            
            if (oldMvpImg) {
                oldMvpImg.classList.remove("active");
                oldMvpImg.classList.add("exit");
                setTimeout(() => oldMvpImg.remove(), 2000);
            }

            if (isMvp) {
                const img = document.createElement("img");
                img.className = "mvp-bg-image";
                img.src = ""; 
                // 优先加载 webp 格式
                const extensions = ['webp', 'jpg', 'png', 'jpeg'];
                const tryLoadMvp = (idx) => {
                    if (idx >= extensions.length) return;
                    const testImg = new Image();
                    testImg.onload = () => {
                        img.src = testImg.src;
                        // 略微延迟以确保 DOM 渲染后触发 CSS 动画
                        requestAnimationFrame(() => {
                            img.classList.add("active");
                        });
                    };
                    testImg.onerror = () => tryLoadMvp(idx + 1);
                    testImg.src = `./pic/${band.name}1.${extensions[idx]}`;
                };
                tryLoadMvp(0);
                mvpContainer.appendChild(img);
            }

            if (!isFirst) {
                void nameEl.offsetWidth;
                void containerEl.offsetWidth;
            }

            // 特殊动画逻辑：如果该乐队在 mvplist 中，数值动画从 0 开始缓慢放大
            // 如果不在 mvplist 中（普通乐队），则从上一个乐队的分数平滑过渡
            if (isFirst || isMvp) {
                startScores = [...CONFIG.MIN_SCORES];
            } else {
                startScores = [...currentScores];
            }
            
            targetScores = band.points.map((v, i) => Math.max(CONFIG.MIN_SCORES[i], v));
            animProgress = 0;
            animStartTime = performance.now();

            nameEl.textContent = band.name;
            depsEl.innerHTML = band.desc;
            
            nameEl.style.animation = "nameEntrance 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards";
            containerEl.style.animation = "descEntrance 1s ease-out 0.3s both";

            // 根据配置控制介绍内容的可见性
            containerEl.style.display = CONFIG.SHOW_DESC ? "inline-block" : "none";

            // 优先加载 webp 格式
            const extensions = ['webp', 'jpg', 'png', 'jpeg'];
            const tryLoad = (idx) => {
                if (idx >= extensions.length) {
                    photoEl.style.opacity = "0";
                    return;
                }
                const imgPath = `./pic/${band.name}.${extensions[idx]}`;
                const tempImg = new Image();
                tempImg.onload = () => {
                    photoEl.src = imgPath;
                    photoEl.style.opacity = "1";
                    // 恢复正常的 3D 转换动画，不再在 transform 里应用缩放
                    photoEl.style.transform = "rotateY(0) translateZ(0)";
                };
                tempImg.onerror = () => tryLoad(idx + 1);
                tempImg.src = imgPath;
            };
            tryLoad(0);

            // 获取当前乐队相对于当前总进度的剩余时间
            const segment = timeSegments.find(s => s.bandIndex === bands.indexOf(band));
            const remainingInSegment = segment.end - globalCurrentTime;
            setProgressBar(remainingInSegment > 0 ? remainingInSegment : band.duration);
        }

        /**
         * 负责在 Canvas 上绘制六维雷达图、背景网格、连接线及其光晕特效
         */
        function drawRadar() {
            const w = radarCanvas.width;   
            const h = radarCanvas.height;  
            const centerX = w / 2;
            const centerY = h / 2;
            
            const maxR = 1000 * 0.4 * CONFIG.RADAR_SCALE; 

            ctx.clearRect(0, 0, w, h);
            ctx.save();
            ctx.lineWidth = CONFIG.RADAR_GRID_LINE_WIDTH;

            // 背景网格 (固定10级基础刻度)，每层都按每个维度的满分计算半径比例
            for (let layer = 1; layer <= CONFIG.RADAR_GRID_LEVELS; layer++) {
                ctx.beginPath();
                for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                    // grid表示满分的比例，比如第10层即 10/10 = 1倍的maxR
                    const r = (layer / CONFIG.RADAR_GRID_LEVELS) * maxR;
                    const angle = (i * (360 / CONFIG.VERTEX_COUNT) - 90) * Math.PI / 180;
                    const x = centerX + r * Math.cos(angle);
                    const y = centerY + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath();
                // 最外层网格线增强2.5倍以突出边界感
                ctx.strokeStyle = `rgba(255, 255, 255, ${layer === CONFIG.RADAR_GRID_LEVELS ? CONFIG.RADAR_GRID_LINE_OPACITY * 2.5 : CONFIG.RADAR_GRID_LINE_OPACITY})`;
                ctx.stroke();
            }

            // 轴向量
            for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                const angle = (i * (360 / CONFIG.VERTEX_COUNT) - 90) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + maxR * Math.cos(angle), centerY + maxR * Math.sin(angle));
                ctx.strokeStyle = `rgba(255, 255, 255, ${CONFIG.RADAR_GRID_LINE_OPACITY})`;
                ctx.stroke();
            }

            // 雷达多边形 (允许超出 maxR，每个维度的基准线单独映射配置)
            ctx.beginPath();
            let polyPoints = [];
            for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                const dimMaxScore = CONFIG.BASE_MAX_SCORES[i];
                const dimMinScore = CONFIG.MIN_SCORES[i];
                // 根据 MIN_SCORES 计算有效显示范围，MIN_SCORES 对应原点 (0%位置)
                const range = Math.max(0.0001, dimMaxScore - dimMinScore);
                const r = ((currentScores[i] - dimMinScore) / range) * maxR;
                const angle = (i * (360 / CONFIG.VERTEX_COUNT) - 90) * Math.PI / 180;
                const x = centerX + r * Math.cos(angle);
                const y = centerY + r * Math.sin(angle);
                polyPoints.push({x, y});
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            
            // 基础填充 (稍微增强一点存在感)
            ctx.shadowBlur = 0;
            ctx.fillStyle = hexToRgbA(currentThemeColor, 0.25);
            ctx.fill();

            // 顶点强调内部发光（限制在多边形内部）
            ctx.save();
            ctx.clip(); // 限制后续绘制只在多边形内
            for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                let hl = dimHighlightLevels[i];
                if (hl > 0.01) {
                    const pt = polyPoints[i];
                    // 在对应顶点处绘制径向渐变光晕
                    const glowRadius = maxR * 0.8 * hl;
                    const grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, glowRadius);
                    grad.addColorStop(0, hexToRgbA(currentThemeColor, 0.8 * hl));
                    grad.addColorStop(1, hexToRgbA(currentThemeColor, 0));
                    ctx.fillStyle = grad;
                    ctx.fill(); 
                }
            }
            ctx.restore();

            // 激光边缘效果 - 更加激进的多重高亮叠加
            ctx.save();
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            
            // 1. 超宽范围的环境光晕 (辉光)
            ctx.shadowBlur = 100; // 大幅增加辉光范围
            ctx.shadowColor = currentThemeColor;
            ctx.strokeStyle = currentThemeColor;
            ctx.lineWidth = 4;
            ctx.stroke();

            // 2. 中层高饱和度激光束
            ctx.shadowBlur = 40;
            ctx.shadowColor = currentThemeColor;
            ctx.strokeStyle = currentThemeColor;
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // 3. 核心亮白色高能射线
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#fff";
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // 4. 二次强化最亮核心 (防止偏色，增加白光质感)
            ctx.shadowBlur = 5;
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 0.8;
            ctx.stroke();
            
            ctx.restore();

            // 1600宽时留更多留白给极端数值以免被截断
            ctx.font = 'bold 28px "Orbitron", sans-serif'; 
            ctx.fillStyle = '#fff';
            for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                const angle = (i * (360 / CONFIG.VERTEX_COUNT) - 90) * Math.PI / 180;
                let hl = dimHighlightLevels[i];
                let marginOffset = hl * 20; // 突出的距离
                let x = centerX + (maxR + CONFIG.LABEL_MARGIN + marginOffset) * Math.cos(angle);
                let y = centerY + (maxR + CONFIG.LABEL_MARGIN + marginOffset) * Math.sin(angle);
                ctx.textAlign = Math.abs(Math.cos(angle)) < 0.1 ? 'center' : (Math.cos(angle) > 0 ? 'left' : 'right');
                ctx.textBaseline = 'middle';
                
                ctx.save();
                if (hl > 0.01) {
                    ctx.shadowBlur = 15 + hl * 15;
                    ctx.shadowColor = currentThemeColor;
                    ctx.fillStyle = "#fff";
                }

                const valStr = formatRadarValue(currentScores[i], i);
                if (CONFIG.SHOW_SCORE_UNDER_NAME) {
                    // 第一行：维度名
                    const fontSizeName = CONFIG.LABEL_FONT_SIZE + hl * 12;
                    ctx.font = `bold ${fontSizeName}px "Orbitron", "HarmonyOS Sans SC", sans-serif`;
                    ctx.fillText(CONFIG.DIM_NAMES[i], x, y - 18 - hl * 5);
                    // 第二行：数值 (字体稍微变细/变小一点作为区分)
                    const fontSizeScore = CONFIG.SCORE_FONT_SIZE + hl * 12;
                    ctx.font = `normal ${fontSizeScore}px "Orbitron", sans-serif`;
                    ctx.fillText(valStr, x, y + 18 + hl * 5);
                } else {
                    const fontSize = CONFIG.LABEL_FONT_SIZE + hl * 12;
                    ctx.font = `bold ${fontSize}px "Orbitron", "HarmonyOS Sans SC", sans-serif`;
                    ctx.fillText(`${CONFIG.DIM_NAMES[i]} ${valStr}`, x, y);
                }
                ctx.restore();
            }
            ctx.restore();
        }

        /**
         * 引擎的核心帧循环（游戏循环）
         * 负责：1. 处理全局的时间线与播放状态; 2. 颜色插值平滑渐变; 3. 处理得分切换的缓动动画; 4. 触发Canvas绘图更新
         * @param {number} timestamp - 配合requestAnimationFrame注入的当前帧高精时间戳
         */
        function tick(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const deltaTime = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            // 1. 全局进度逻辑
            if (!isPaused && globalCurrentTime < totalDuration) {
                globalCurrentTime += deltaTime;
                if (globalCurrentTime >= totalDuration) {
                    globalCurrentTime = totalDuration;
                    isPaused = true; // 播放结束
                }

                // 更新全局进度条展示
                const progressPer = (globalCurrentTime / totalDuration) * 100;
                globalBar.style.width = progressPer + "%";

                // 检查是否需要切换乐队
                const currentSegment = timeSegments.find(s => globalCurrentTime >= s.start && globalCurrentTime < s.end);
                if (currentSegment && currentSegment.bandIndex !== currentIndex) {
                    currentIndex = currentSegment.bandIndex;
                    updateUI(bands[currentIndex], currentIndex === 0 && globalCurrentTime < 1000); 
                }
            }

            // 2. 颜色平滑过渡
            if (currentThemeColor !== targetThemeColor) {
                currentThemeColor = lerpColor(currentThemeColor, targetThemeColor, 0.02);
            }

            // 3. 雷达数值动画
            if (animProgress < 1) {
                const elapsed = performance.now() - animStartTime;
                let t = Math.min(elapsed / ANIM_DURATION, 1);
                t = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) currentScores[i] = (1 - t) * startScores[i] + t * targetScores[i];
                if (t >= 1) animProgress = 1;
            }

            // 顶点强调动画
            for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                const targetLevel = (i === activeHighlightDim) ? 1 : 0;
                dimHighlightLevels[i] += (targetLevel - dimHighlightLevels[i]) * Math.min(deltaTime * 0.01, 1);
            }

            // 粒子淡入淡出动画 (1000ms 过渡)
            const targetFade = isParticlesEnabled ? 1 : 0;
            if (particleFadeLevel !== targetFade) {
                const fadeStep = deltaTime / 1000;
                if (particleFadeLevel < targetFade) {
                    particleFadeLevel = Math.min(1, particleFadeLevel + fadeStep);
                } else {
                    particleFadeLevel = Math.max(0, particleFadeLevel - fadeStep);
                }
            }

            // 4. 渲染
            if (particleFadeLevel > 0) {
                pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
            } else {
                pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            }
            drawRadar();
            updateTimer();
            requestAnimationFrame(tick);
        }

        // 全局进度条拖动逻辑
        globalTimeline.addEventListener('mouseenter', () => {
             timelineTooltip.style.display = 'block';
        });

        globalTimeline.addEventListener('mousedown', (e) => {
            isGlobalTimelineDragging = true;
            timelineTooltip.style.display = 'block';
            updateGlobalTimeFromClick(e);
        });

        window.addEventListener('mousemove', (e) => {
            // 获取相对于 timeline 的坐标
            const rect = globalTimeline.getBoundingClientRect();
            const isInTimeline = (e.clientY >= rect.top && e.clientY <= rect.bottom);
            
            if (isInTimeline || isGlobalTimelineDragging) {
                const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
                const per = x / rect.width;
                const previewTime = per * totalDuration;
                
                // 找到预览时间对应的乐队
                const previewSegment = timeSegments.find(s => previewTime >= s.start && previewTime <= s.end);
                const previewBandName = previewSegment ? bands[previewSegment.bandIndex].name : "";

                const diff = Math.floor(previewTime / 1000);
                const m = Math.floor(diff / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                
                timelineTooltip.style.left = `${e.clientX - 25}px`;
                timelineTooltip.innerHTML = `<div style="font-size:0.7rem; opacity:0.8; font-family:'HarmonyOS Sans SC'">${previewBandName}</div>${m}:${s}`;
                timelineTooltip.style.display = 'block';
            } else if (!isGlobalTimelineDragging) {
                timelineTooltip.style.display = 'none';
            }

            if (isGlobalTimelineDragging) updateGlobalTimeFromClick(e);
        });

        globalTimeline.addEventListener('mouseleave', () => {
            if (!isGlobalTimelineDragging) timelineTooltip.style.display = 'none';
        });

        window.addEventListener('mouseup', () => {
            isGlobalTimelineDragging = false;
            timelineTooltip.style.display = 'none';
        });

        function updateGlobalTimeFromClick(e) {
            const rect = globalTimeline.getBoundingClientRect();
            const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
            const per = x / rect.width;
            globalCurrentTime = per * totalDuration;
            
            // 同步音频进度
            const audio = document.getElementById("bgMusic");
            if (audio && audio.duration) {
                audio.currentTime = (globalCurrentTime / 1000) % audio.duration;
            }

            // 立即检查并切换
            const currentSegment = timeSegments.find(s => globalCurrentTime >= s.start && globalCurrentTime <= s.end);
            if (currentSegment && currentSegment.bandIndex !== currentIndex) {
                currentIndex = currentSegment.bandIndex;
                updateUI(bands[currentIndex], false);
            }
            if (globalCurrentTime < totalDuration) {
                isPaused = false;
                if (audio) audio.play();
            }
        }

        window.addEventListener("keydown", (e) => {
            // 数字键强调效果 (1-8 键，0 键取消)
            if (e.key >= '1' && e.key <= '8') {
                const dimIndex = parseInt(e.key) - 1;
                if (dimIndex < CONFIG.VERTEX_COUNT) {
                    activeHighlightDim = dimIndex;
                }
            } else if (e.key === '0') {
                activeHighlightDim = -1;
            }

            if (e.key === "f" || e.key === "F" || e.key === "F11") {
                // 如果是 F11，阻止默认行为以使用我们自定义的全屏逻辑控制 UI 隐藏
                if (e.key === "F11") e.preventDefault();
                
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            }

            const audio = document.getElementById("bgMusic");
            if (e.key.toLowerCase() === 'p') {
                isParticlesEnabled = !isParticlesEnabled;
                if (isParticlesEnabled) {
                    document.body.classList.remove("particles-disabled");
                } else {
                    document.body.classList.add("particles-disabled");
                }
            }
            if (e.key === " ") { // 空格暂停/播放 或 开始准备页
                if (!isStarted) {
                    isStarted = true;
                    startIntroSystem(); // 开始准备系统
                    return;
                }
                isPaused = !isPaused;
                if (audio) {
                    if (isPaused) audio.pause();
                    else audio.play();
                }
            } else if (e.key === "ArrowLeft") {
                const nextIdx = Math.max(0, currentIndex - 1);
                globalCurrentTime = timeSegments[nextIdx].start;
                if (audio) audio.currentTime = globalCurrentTime / 1000;
                isPaused = false;
                if (audio) audio.play();
            } else if (e.key === "ArrowRight") {
                const nextIdx = Math.min(bands.length - 1, currentIndex + 1);
                globalCurrentTime = timeSegments[nextIdx].start;
                if (audio) audio.currentTime = globalCurrentTime / 1000;
                isPaused = false;
                if (audio) audio.play();
            }
        });

        function startIntroSystem() {
            const audio = document.getElementById("bgMusic");
            const overlay = document.getElementById("introOverlay");
            const pCanvas = document.getElementById("particles-canvas");

            // 移除提示文字
            overlay.classList.add("started"); 

            // 在等待 3 秒期间，静默“播放再暂停”以绕过浏览器策略，但不发出声音
            if (audio) {
                audio.muted = true;
                audio.play().then(() => {
                    audio.pause();
                    audio.muted = false;
                    audio.currentTime = 0;
                }).catch(e => console.log("Audio prep failed", e));
            }

            setTimeout(() => {
                overlay.style.opacity = "0";
                isPaused = false; 
                pCanvas.style.zIndex = "0"; 

                if (audio) {
                    audio.play().catch(e => console.log("Audio play failed", e));
                }
                setTimeout(() => {
                    overlay.style.display = "none";
                }, 1000);
            }, CONFIG.INTRO_WAIT_TIME);
        }

        window.onload = function() {
            // 在正式播放前就开始渲染粒子和雷达（静态背景）
            requestAnimationFrame(tick);

            // 拖拽图片下载功能
            window.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
            });

            window.addEventListener('drop', (e) => {
                e.preventDefault();
                const files = e.dataTransfer.files;
                if (files.length > 0 && currentIndex >= 0) {
                    const file = files[0];
                    if (file.type.startsWith('image/')) {
                        const currentBandName = bands[currentIndex].name;
                        const extension = file.name.split('.').pop();
                        const newFileName = `${currentBandName}.${extension}`;

                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const link = document.createElement('a');
                            link.href = event.target.result;
                            link.download = newFileName;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                        };
                        reader.readAsDataURL(file);
                    }
                }
            });
        };
    </script>
</body>
</html>
